name: Build Android APK

# Builds an installable APK entirely on the GitHub runner (no EAS cloud, no
# queue) and attaches it to the run as a downloadable artifact:
#   Actions → this run → "garageflow-apk".
#
# It runs `expo prebuild` to generate the native android/ project, then a plain
# Gradle debug build. The debug APK is self-signed and directly installable on a
# device (enable "install unknown apps") — no secrets or keystore needed.
#
# Run it: Actions tab → "Build Android APK" → "Run workflow".

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - "**.md"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -n1)
          echo "Found APK: $APK"
          if [ -z "$APK" ]; then echo "No APK produced"; exit 1; fi
          cp "$APK" garageflow.apk
          ls -la garageflow.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: garageflow-apk
          path: garageflow.apk
          if-no-files-found: error
