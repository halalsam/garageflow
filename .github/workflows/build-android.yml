name: Build Android APK

# Builds an installable APK via EAS cloud, then attaches it to the workflow run
# as a downloadable artifact (Actions → this run → "garageflow-apk").
#
# Setup (one time):
#   1. Create a free Expo account at https://expo.dev
#   2. Make an access token: https://expo.dev/accounts/[you]/settings/access-tokens
#   3. Add it to this repo: Settings → Secrets and variables → Actions →
#      New repository secret → name EXPO_TOKEN, value = the token
#
# Run it: Actions tab → "Build Android APK" → "Run workflow".

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - "**.md"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build APK (EAS cloud)
        # --wait blocks until the cloud build finishes; the JSON gives us the
        # artifact URL to download.
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --json > build-result.json
          cat build-result.json

      - name: Download the built APK
        run: |
          URL=$(node -e "const b=require('./build-result.json'); const x=Array.isArray(b)?b[0]:b; console.log(x.artifacts?.applicationArchiveUrl || x.artifacts?.buildUrl || '')")
          echo "Artifact URL: $URL"
          if [ -z "$URL" ]; then echo "No artifact URL found"; exit 1; fi
          curl -L "$URL" -o garageflow.apk
          ls -la garageflow.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: garageflow-apk
          path: garageflow.apk
          if-no-files-found: error
