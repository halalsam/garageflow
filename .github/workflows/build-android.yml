name: Build Android APK

# Builds a SIGNED RELEASE APK entirely on the GitHub runner (no EAS, no queue)
# and attaches it as a downloadable artifact: Actions → this run → "garageflow-apk".
#
# It runs `expo prebuild` to generate the native android/ project, injects a
# release signing config from repo secrets, then runs Gradle assembleRelease.
# The result is a properly signed, directly-installable release APK.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   - base64 of the .keystore file
#   ANDROID_KEYSTORE_PASSWORD - store password
#   ANDROID_KEY_PASSWORD      - key password
#   ANDROID_KEY_ALIAS         - key alias
#
# Run it: Actions tab → "Build Android APK" → "Run workflow".

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - "**.md"

# A newer push supersedes any build still running for the same branch.
concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # The ubuntu runner image ships with the Android SDK preinstalled
      # (ANDROID_HOME is preset), so no SDK setup step is needed.
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Owns Gradle caching properly: keys on the actual dependency graph and
      # re-saves when it changes (a plain actions/cache keyed on *.gradle files
      # can't work here — android/ doesn't exist until prebuild runs).
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native Android project
        run: npx expo prebuild --platform android --no-install

      # The template's 2GB heap starves the build on a 16GB runner; the local
      # build cache lets unchanged modules skip recompilation across runs.
      - name: Tune Gradle for CI
        run: |
          {
            echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m"
            echo "org.gradle.caching=true"
            echo "org.gradle.parallel=true"
          } >> android/gradle.properties

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing. Add the signing secrets to the repo." >&2
            exit 1
          fi
          # Absolute path: -Pandroid.injected.signing.store.file is resolved
          # relative to the Gradle daemon CWD, not the module, so a relative
          # path is looked up in the wrong place.
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.keystore" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Locate APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n1)
          echo "Found APK: $APK"
          if [ -z "$APK" ]; then echo "No APK produced" >&2; exit 1; fi
          cp "$APK" garageflow.apk
          ls -la garageflow.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: garageflow-apk
          path: garageflow.apk
          if-no-files-found: error
